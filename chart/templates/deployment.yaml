apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openprime-postgres.fullname" . }}
  labels:
    {{- include "openprime-postgres.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openprime-postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openprime-postgres.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openprime-postgres.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.auth.autoSyncPasswords }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until pg_isready -h localhost -U postgres; do sleep 2; done
                    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "ALTER USER openprime_user WITH PASSWORD '$OPENPRIME_USER_PASSWORD';"
                    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "ALTER USER keycloak_user WITH PASSWORD '$KEYCLOAK_USER_PASSWORD';"
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username }}
            
            {{- /* 1. Main Postgres Password Logic */ -}}
            {{- if .Values.auth.existingSecret }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKeys.postgresPassword | default "postgres-password" }}
            {{- else if .Values.auth.secrets.postgresPassword }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openprime-postgres.fullname" . }}-auth
                  key: postgres-password
            {{- else }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.auth.postgresPassword | quote }}
            {{- end }}

            {{- /* 2. Application User Passwords (for init script) */ -}}
            {{- if .Values.auth.existingSecret }}
            - name: OPENPRIME_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKeys.openprimePassword | default "openprime-user-password" }}
            - name: KEYCLOAK_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKeys.keycloakPassword | default "keycloak-user-password" }}
            {{- else if .Values.auth.secrets.openprimePassword }}
            - name: OPENPRIME_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openprime-postgres.fullname" . }}-auth
                  key: openprime-user-password
            - name: KEYCLOAK_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openprime-postgres.fullname" . }}-auth
                  key: keycloak-user-password
            {{- end }}

            - name: PGDATA
              value: {{ .Values.persistence.mountPath }}/pgdata
            {{- range $key, $value := .Values.postgresql.config }}
            - name: POSTGRES_{{ $key | upper }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.healthCheck.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-storage
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.initdb.enabled }}
            - name: initdb-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            {{- end }}
      volumes:
        - name: postgres-storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openprime-postgres.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.initdb.enabled }}
        - name: initdb-scripts
          configMap:
            name: {{ include "openprime-postgres.fullname" . }}-initdb
            defaultMode: 0755
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}